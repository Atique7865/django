apiVersion: v1
kind: ConfigMap
metadata:
  name: django-config
  namespace: user-management
data:
  DJANGO_DEBUG: "False"
  DJANGO_ALLOWED_HOSTS: "user-management.example.com"
  DJANGO_CSRF_TRUSTED_ORIGINS: "https://user-management.example.com"
  POSTGRES_DB: "user_management"
  POSTGRES_USER: "user_management"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"

