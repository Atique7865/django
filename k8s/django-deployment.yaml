apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-web
  namespace: user-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: django-web
  template:
    metadata:
      labels:
        app: django-web
    spec:
      containers:
        - name: django-web
          image: your-registry/django-user-management:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: django-config
            - secretRef:
                name: django-secret
          readinessProbe:
            httpGet:
              path: /login/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20

